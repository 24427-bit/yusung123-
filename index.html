<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일상 속 물리 아카이브 (Physics Archive)</title>
  <style>
    /* 우주와 실험실 느낌의 사이버 랩(Cyber Lab) 다크 테마 스타일링 */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #f1f5f9;
      padding-bottom: 40px;
    }

    .container {
      width: min(1000px, 94%);
      margin: 40px auto;
      background: rgba(30, 41, 59, 0.7);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 32px;
      background: linear-gradient(to right, #00d2ff, #7e57c2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 15px;
    }

    /* 인증 섹션 */
    .auth-box {
      max-width: 400px;
      margin: 20px auto;
      background: rgba(15, 23, 42, 0.6);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-box h2 {
      margin: 0 0 4px;
      font-size: 20px;
      color: #38bdf8;
      text-align: center;
    }

    .notice {
      max-width: 400px;
      margin: 12px auto 0;
      padding: 12px;
      border-radius: 10px;
      background: rgba(56, 189, 248, 0.1);
      color: #bae6fd;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    /* 메인 콘텐츠 섹션 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 14px 20px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .user-info {
      font-size: 14px;
      color: #cbd5e1;
    }

    .user-info strong {
      color: #38bdf8;
    }

    /* [추가] 탭 시스템 메뉴 스타일 */
    .tab-menu {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      height: 48px;
      background: rgba(15, 23, 42, 0.5);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      border-color: #38bdf8;
    }

    .form-box {
      background: rgba(15, 23, 42, 0.4);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-label {
      font-size: 14px;
      font-weight: bold;
      color: #38bdf8;
    }

    input, textarea, select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input { height: 46px; padding: 0 14px; }
    select { height: 44px; padding: 0 12px; }
    textarea { min-height: 120px; padding: 14px; resize: vertical; font-family: inherit; line-height: 1.6; }

    input:focus, textarea:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .config-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* 버튼 스타일링 */
    button, .download-link {
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      height: 46px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    button:hover, .download-link:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none !important;
    }

    .login-btn { background: #38bdf8; color: #0f172a; }
    .signup-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.4); }
    .logout-btn { background: #475569; color: #f1f5f9; height: 38px; font-size: 13px; }
    
    .add-btn { background: linear-gradient(to right, #00d2ff, #0284c7); color: white; width: 100%; font-size: 16px; }
    .tts-btn { background: linear-gradient(to right, #a78bfa, #7e57c2); color: white; width: 100%; font-size: 16px; }
    .download-link { background: #334155; color: #f1f5f9; border: 1px solid rgba(255, 255, 255, 0.1); }

    .edit-btn { background: #eab308; color: #0f172a; height: 34px; font-size: 13px; padding: 0 12px; }
    .delete-btn { background: #ef4444; color: white; height: 34px; font-size: 13px; padding: 0 12px; }
    .save-btn { background: #10b981; color: white; height: 38px; }
    .cancel-btn { background: #64748b; color: white; height: 38px; }

    .status {
      min-height: 24px;
      margin-bottom: 16px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
      font-style: italic;
    }

    /* 독립형 TTS 전용 결과창 */
    .tts-result-box {
      background: rgba(15, 23, 42, 0.6);
      padding: 18px;
      border-radius: 14px;
      border: 1px solid rgba(167, 139, 250, 0.3);
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    audio {
      width: 100%;
      height: 40px;
      outline: none;
    }

    /* 아카이브 피드 리스트 */
    .list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .item {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: 0.2s;
    }

    .item:hover {
      border-color: rgba(56, 189, 248, 0.3);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .item-title {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
      line-height: 1.4;
    }

    .item-author {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .analysis-container {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(56, 189, 248, 0.1);
    }

    .analysis-label {
      font-size: 12px;
      color: #00d2ff;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .item-content {
      margin: 0;
      color: #e2e8f0;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }

    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .item-date {
      font-size: 12px;
      color: #64748b;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .edit-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .edit-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #64748b;
      background: rgba(15, 23, 42, 0.3);
      border-radius: 16px;
      border: 1px dashed rgba(255, 255, 255, 0.05);
      font-style: italic;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 700px) {
      .container { padding: 20px; margin: 16px auto; }
      .config-row { grid-template-columns: 1fr; }
      .item-header { flex-direction: column; gap: 8px; }
      .item-footer { flex-direction: column; align-items: flex-start; gap: 12px; }
      .item-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>일상 속 물리 아카이브</h1>
    <div class="subtitle">연구소 내에서 자유롭게 원리를 탐구하고, 텍스트를 음성으로 변환해 보세요.</div>

    <section id="authSection">
      <div class="auth-box">
        <h2>실험실 입장 (로그인)</h2>
        <input id="emailInput" type="email" placeholder="이메일 주소" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="login-btn" id="loginBtn">로그인</button>
        <button class="signup-btn" id="signupBtn">연구원 등록 (회원가입)</button>
      </div>
      <div class="notice">
        💡 질문 등록 및 TTS 개별 사용은 연구원 로그인 후 가능합니다.<br />
        비로그인 상태에서는 공유 피드에 아카이브된 기록만 자유롭게 열람할 수 있습니다.
      </div>
    </section>

    <section id="mainSection">
      <div id="writeArea" class="hidden">
        <div class="top-bar">
          <div class="user-info">
            접속 연구원: <strong id="userEmail"></strong>
          </div>
          <button class="logout-btn" id="logoutBtn">연구실 퇴실 (로그아웃)</button>
        </div>

        <div class="tab-menu">
          <button class="tab-btn active" id="tabPhysicsBtn">🧬 AI 물리학자 분석실</button>
          <button class="tab-btn" id="tabTtsBtn">🎧 독립형 TTS 음성 변환실</button>
        </div>

        <div id="panelPhysics" class="form-box">
          <div class="form-label">🔬 분석하고 기록할 일상 속 물리 현상</div>
          <input id="titleInput" type="text" placeholder="예: 무지개는 왜 항상 둥근 원호 모양으로 생기나요?" />
          <button class="add-btn" id="addBtn">🧬 AI 분석 및 아카이브 기록</button>
        </div>

        <div id="panelTts" class="form-box hidden">
          <div class="form-label">✍️ 오디오로 변환할 자유 텍스트 입력</div>
          <textarea id="ttsTextInput" placeholder="음성 파일로 만들고 싶은 문장을 입력해 보세요."></textarea>
          
          <div class="config-row">
            <div>
              <div class="form-label">🗣️ 안내 음성 보이스</div>
              <select id="voiceSelect">
                <option value="onyx">Onyx (신뢰감 주는 남성)</option>
                <option value="nova">Nova (차분한 여성)</option>
                <option value="alloy">Alloy (중성적이고 깔끔함)</option>
                <option value="echo">Echo (에너지 넘치는 스타일)</option>
                <option value="shimmer">Shimmer (지적인 스타일)</option>
              </select>
            </div>
            <div>
              <div class="form-label">⚡ 낭독 속도</div>
              <input id="speedInput" type="number" min="0.5" max="2.0" step="0.1" value="1.0" />
            </div>
          </div>

          <button class="tts-btn" id="makeSpeechBtn">🎧 mp3 음성 파일 합성하기</button>

          <div id="ttsResultBox" class="tts-result-box hidden">
            <div class="form-label" style="color:#a78bfa;">🎵 생성된 오디오 미리보기</div>
            <audio id="audioPlayer" controls></audio>
            <a id="downloadLink" class="download-link" href="#" download="physics-tts.mp3">📥 컴퓨터에 MP3 다운로드</a>
          </div>
        </div>
      </div>

      <div id="status" class="status">아카이브 데이터를 동기화하는 중...</div>
      
      <div class="form-label" style="margin-bottom: 12px; font-size: 16px;">📚 축적된 아카이브 피드</div>
      <div id="dataList" class="list"></div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      remove,
      onValue
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // Firebase 설정 정보 유지
    const firebaseConfig = {
      apiKey: "AIzaSyCUxLBJ6sFc6CmmqyP81CozGN8_fTo1mbM",
  authDomain: "test-a155f.firebaseapp.com",
  databaseURL: "https://test-a155f-default-rtdb.firebaseio.com",
  projectId: "test-a155f",
  storageBucket: "test-a155f.firebasestorage.app",
  messagingSenderId: "384830685677",
  appId: "1:384830685677:web:9ae902a851a838981de7e4",
  measurementId: "G-0RVRLSP6J1"
};
};
    // Google Apps Script 연동 통합 백엔드 URL
    const APPS_SCRIPT_CHAT_URL = 'https://script.google.com/macros/s/AKfycbzS38oG2y__G_nzyifYogA-vcc0kQzRuX6gzKJrDhoUyX9h2ZG2ZxfKH0arORpEt-tq/exec';
    const APPS_SCRIPT_TTS_URL = 'https://script.google.com/macros/s/AKfycbzS38oG2y__G_nzyifYogA-vcc0kQzRuX6gzKJrDhoUyX9h2ZG2ZxfKH0arORpEt-tq/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // DOM 요소 탐색
    const authSection = document.getElementById('authSection');
    const writeArea = document.getElementById('writeArea');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    
    // 탭 및 제어판 패널 요소
    const tabPhysicsBtn = document.getElementById('tabPhysicsBtn');
    const tabTtsBtn = document.getElementById('tabTtsBtn');
    const panelPhysics = document.getElementById('panelPhysics');
    const panelTts = document.getElementById('panelTts');

    // 기능 입력 요소
    const titleInput = document.getElementById('titleInput');
    const addBtn = document.getElementById('addBtn');
    
    const ttsTextInput = document.getElementById('ttsTextInput');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeSpeechBtn = document.getElementById('makeSpeechBtn');
    const ttsResultBox = document.getElementById('ttsResultBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');

    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');

    let currentUser = null;

    function setStatus(message) {
      statusBox.textContent = message;
    }

    // [추가] 상단 토글식 탭 메뉴 전환 인터랙션 로직
    tabPhysicsBtn.addEventListener('click', () => {
      tabPhysicsBtn.classList.add('active');
      tabTtsBtn.classList.remove('active');
      panelPhysics.classList.remove('hidden');
      panelTts.classList.add('hidden');
    });

    tabTtsBtn.addEventListener('click', () => {
      tabTtsBtn.classList.add('active');
      tabPhysicsBtn.classList.remove('active');
      panelTts.classList.remove('hidden');
      panelPhysics.classList.add('hidden');
    });

    // 1. 회원가입 및 로그인 처리
    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if(!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert('연구원으로 등록되었습니다!');
      } catch (error) {
        alert(getKoreanErrorMessage(error.code));
      }
    });

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if(!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        alert(getKoreanErrorMessage(error.code));
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try { await signOut(auth); } catch (error) { alert('로그아웃 실패'); }
    });

    // 2. 인증 상태 변화 감지
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        authSection.classList.add('hidden');
        writeArea.classList.remove('hidden');
        userEmail.textContent = user.email;
        emailInput.value = ''; passwordInput.value = '';
      } else {
        currentUser = null;
        authSection.classList.remove('hidden');
        writeArea.classList.add('hidden');
        userEmail.textContent = '';
      }
    });

    // 3. 글로벌 아카이브 실시간 피드 동기화
    const globalArchiveRef = ref(database, 'archive');
    onValue(globalArchiveRef, (snapshot) => {
      const data = snapshot.val();
      renderData(data);
      setStatus('실시간 아카이브 데이터 동기화 완료');
    }, (error) => {
      console.error(error);
      setStatus('데이터 로드 실패');
    });

    // 4. 독립 창 A: 오직 AI 물리 분석 및 결과 피드 등록 (TTS 결합 제외)
    addBtn.addEventListener('click', async () => {
      if (!currentUser) return alert('로그인이 필요합니다.');
      const title = titleInput.value.trim();
      if (!title) return alert('분석할 물리 현상 명칭이나 질문을 입력해 주세요.');

      try {
        addBtn.disabled = true;
        addBtn.textContent = '🧬 AI 물리학자가 원리를 심층 분석하는 중...';
        setStatus('🚀 AI 물리학자가 원리를 분석 중입니다.');

        const promptText = `너는 아주 친절하고 전문적인 물리학 교수이자 박사야. 다음 일상 현상에 대해 고등학생도 직관적으로 이해할 수 있도록 명쾌하고 흥미롭게 설명해줘. 핵심 법칙이나 이론이 있다면 명확하게 짚어줘. 짧고 가독성 좋게 4-5문장 이내로 작성해줘: "${title}"`;
        
        const chatResponse = await fetch(APPS_SCRIPT_CHAT_URL, {
          method: 'POST',
          body: JSON.stringify({ question: promptText })
        });
        const chatData = await chatResponse.json();
        if (chatData.error) throw new Error(chatData.error);
        const aiAnswer = chatData.answer || '답변을 생성하지 못했습니다.';

        setStatus('💾 분석된 내용을 피드 아카이브에 영구 저장하는 중...');

        const newPostRef = push(globalArchiveRef);
        await set(newPostRef, {
          title: title,
          content: aiAnswer,
          uid: currentUser.uid,
          author: currentUser.email,
          createdAt: new Date().toLocaleString('ko-KR'),
          updatedAt: ''
        });

        titleInput.value = '';
        setStatus('🎉 아카이브 등록 성공!');
      } catch (error) {
        console.error(error);
        setStatus('처리 실패');
        alert('오류 발생: ' + error.message);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = '🧬 AI 분석 및 아카이브 기록';
      }
    });

    // 5. 독립 창 B: 순수 개별 입력형 TTS 음성 변환 합성 처리 로직
    makeSpeechBtn.addEventListener('click', async () => {
      const text = ttsTextInput.value.trim();
      const voice = voiceSelect.value;
      const speed = Number(speedInput.value || 1.0);

      if (!text) return alert('음성으로 변환할 자유 텍스트 문장을 입력해 주세요.');

      try {
        makeSpeechBtn.disabled = true;
        makeSpeechBtn.textContent = '🔮 오디오 생성 및 음성 코딩 중...';
        ttsResultBox.classList.add('hidden');
        setStatus('🔊 독립형 TTS 엔진 가동 및 음성 합성 중입니다.');

        const ttsResponse = await fetch(APPS_SCRIPT_TTS_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'tts',
            text: text,
            model: 'tts-1',
            voice: voice,
            speed: speed
          })
        });
        const ttsData = await ttsResponse.json();
        if (ttsData.error) throw new Error(ttsData.error);
        if (!ttsData.audioBase64) throw new Error('음성 데이터 추출 패배');
        
        // 브라우저에서 재생 및 파일 다운로드가 가능하도록 Blob 변환
        const audioUrl = base64ToAudioUrl(ttsData.audioBase64, 'audio/mpeg');

        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = `audio-${Date.now()}.mp3`;
        
        ttsResultBox.classList.remove('hidden');
        setStatus('🔊 mp3 음성 합성 완료!');
      } catch (error) {
        console.error(error);
        setStatus('음성 합성 실패');
        alert('TTS 가동 실패: ' + error.message);
      } finally {
        makeSpeechBtn.disabled = false;
        makeSpeechBtn.textContent = '🎧 mp3 음성 파일 합성하기';
      }
    });

    // 바이너리 데이터 변환 변환 유틸 함수
    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }
      const blob = new Blob(byteArrays, { type: mimeType });
      return URL.createObjectURL(blob);
    }

    // 6. 아카이브 피드 리스트 렌더링
    function renderData(data) {
      dataList.innerHTML = '';
      if (!data) {
        dataList.innerHTML = '<div class="empty">아직 축적된 물리 아카이브가 없습니다.</div>';
        return;
      }

      const entries = Object.entries(data).reverse();

      entries.forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.id = `item-${id}`;

        const isMyPost = currentUser && currentUser.uid === item.uid;
        const actionButtons = isMyPost ? `
          <div class="item-actions">
            <button class="edit-btn" onclick="showEditForm('${id}', '${escapeForAttribute(item.title || '')}', '${escapeForAttribute(item.content || '')}')">설명 수정</button>
            <button class="delete-btn" onclick="deleteData('${id}')">삭제</button>
          </div>
        ` : '';

        div.innerHTML = `
          <div class="item-header">
            <div>
              <p class="item-title">❓ ${escapeHTML(item.title || '')}</p>
              <div class="item-author">제보 연구원: ${escapeHTML(item.author || '익명')}</div>
            </div>
          </div>
          
          <div class="analysis-container">
            <div class="analysis-label">🎓 AI 물리학자 분석 정해</div>
            <p class="item-content">${escapeHTML(item.content || '')}</p>
          </div>
          
          <div class="item-footer">
            <div class="item-date">
              등록: ${item.createdAt || '-'} ${item.updatedAt ? ` / 수정: ${item.updatedAt}` : ''}
            </div>
            ${actionButtons}
          </div>
        `;
        dataList.appendChild(div);
      });
    }

    // 7. 데이터 수정 및 삭제 바인딩
    window.deleteData = async function(id) {
      if (!currentUser) return;
      if (!confirm('해당 아카이브 데이터를 완전히 삭제하시겠습니까?')) return;
      try {
        await remove(ref(database, `archive/${id}`));
        setStatus('아카이브 데이터 삭제 완료');
      } catch (error) {
        alert('삭제 처리 실패');
      }
    };

    window.showEditForm = function(id, title, content) {
      const itemBox = document.getElementById(`item-${id}`);
      itemBox.innerHTML = `
        <div class="edit-box">
          <div class="form-label">📌 현상 질문 수정</div>
          <input id="edit-title-${id}" type="text" value="${title}" />
          <div class="form-label">📌 물리학적 해설 내용 직접 수정</div>
          <textarea id="edit-content-${id}" rows="5">${content}</textarea>
          <div class="edit-buttons">
            <button class="save-btn" onclick="updateData('${id}')">💾 수정사항 저장</button>
            <button class="cancel-btn" onclick="location.reload()">취소</button>
          </div>
        </div>
      `;
    };

    window.updateData = async function(id) {
      if (!currentUser) return;
      const editTitle = document.getElementById(`edit-title-${id}`).value.trim();
      const editContent = document.getElementById(`edit-content-${id}`).value.trim();

      if (!editTitle || !editContent) return alert('모든 항목을 입력해야 합니다.');

      try {
        setStatus('아카이브 수정본 기록 중...');
        await update(ref(database, `archive/${id}`), {
          title: editTitle,
          content: editContent,
          updatedAt: new Date().toLocaleString('ko-KR')
        });
      } catch (error) {
        alert('수정 실패');
      }
    };

    function escapeHTML(text) {
      return String(text)
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function escapeForAttribute(text) {
      return escapeHTML(text).replaceAll('`', '&#096;');
    }

    function getKoreanErrorMessage(code) {
      switch (code) {
        case 'auth/email-already-in-use': return '이미 등록된 연구원 이메일입니다.';
        case 'auth/invalid-email': return '올바른 이메일 양식이 아닙니다.';
        case 'auth/weak-password': return '비밀번호를 6자리 이상 설정하세요.';
        case 'auth/invalid-credential': return '계정 정보가 올바르지 않습니다.';
        default: return `제어 오류: ${code}`;
      }
    }
  </script>
